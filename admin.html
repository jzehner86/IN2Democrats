<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — IN-02 Democrats</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ── Auth gate (shown until key is verified) ───────────────── -->
<div id="auth-gate" class="auth-gate">
    <h1>IN-02 <span style="color:var(--heartland-yellow)">DEMS</span> Admin</h1>
    <p>Enter your admin key to manage event submissions.</p>
    <input type="password" id="admin-key-input" placeholder="Admin key" autocomplete="current-password">
    <p id="auth-error" class="auth-error" aria-live="polite"></p>
    <button id="auth-submit" class="btn btn-blue" style="width:100%">Log In</button>
</div>

<!-- ── Admin dashboard (hidden until authenticated) ──────────── -->
<div id="admin-dashboard" class="admin-wrap" hidden>

    <div class="admin-header">
        <h1>IN-02 <span>DEMS</span> Admin</h1>
        <div style="display:flex;gap:0.75rem;align-items:center">
            <button id="refresh-btn" class="btn btn-blue" style="font-size:0.9rem;padding:0.5rem 1rem">Refresh</button>
            <button id="logout-btn" class="btn" style="font-size:0.9rem;padding:0.5rem 1rem;background:#888;color:#fff">Log Out</button>
        </div>
    </div>

    <!-- Pending events -->
    <section class="admin-section">
        <h2>
            Pending Review
            <span id="pending-count" class="count-badge">0</span>
        </h2>
        <div id="pending-list"><p class="no-events">Loading…</p></div>
    </section>

    <!-- Approved events -->
    <section class="admin-section">
        <h2>
            Approved
            <span id="approved-count" class="count-badge approved">0</span>
        </h2>
        <div id="approved-list"></div>
    </section>

    <!-- Rejected events -->
    <section class="admin-section">
        <h2>Rejected / Archived</h2>
        <div id="rejected-list"></div>
    </section>

    <hr class="admin-divider">

    <!-- News stories -->
    <div class="admin-news-header">
        <h2>News Stories</h2>
        <button class="btn btn-blue" onclick="openNewsModal()" style="font-size:0.85rem;padding:0.5rem 1.1rem">+ Add Story</button>
    </div>

    <section class="admin-section">
        <h3>
            Published
            <span id="published-news-count" class="count-badge approved">0</span>
        </h3>
        <div id="published-news-list"><p class="no-events">Loading…</p></div>
    </section>

    <section class="admin-section">
        <h3>Drafts / Hidden</h3>
        <div id="draft-news-list"><p class="no-events">Loading…</p></div>
    </section>

</div>

<!-- Toast notification -->
<div id="admin-toast" class="admin-toast" role="status" aria-live="polite"></div>

<!-- Edit Event modal -->
<div id="editEventModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal-content admin-edit-modal-content">
        <button class="close-btn" aria-label="Close" onclick="closeEditModal()">&times;</button>
        <h2 id="edit-modal-title">Edit Event</h2>
        <form id="edit-event-form" class="admin-edit-form" novalidate>
            <input type="hidden" id="edit-evt-id">
            <div class="field-full">
                <label for="edit-evt-title">Event Title <span aria-hidden="true">*</span></label>
                <input type="text" id="edit-evt-title" name="title" required maxlength="200">
            </div>
            <div>
                <label for="edit-evt-date">Date <span aria-hidden="true">*</span></label>
                <input type="date" id="edit-evt-date" name="date" required>
            </div>
            <div>
                <label for="edit-evt-time">Start Time <span aria-hidden="true">*</span></label>
                <input type="time" id="edit-evt-time" name="time" required>
            </div>
            <div>
                <label for="edit-evt-location">Venue / Location Name <span aria-hidden="true">*</span></label>
                <input type="text" id="edit-evt-location" name="location" required maxlength="200">
            </div>
            <div>
                <label for="edit-evt-address">Street Address</label>
                <input type="text" id="edit-evt-address" name="address" maxlength="300">
            </div>
            <div class="field-full">
                <label for="edit-evt-desc">Description</label>
                <textarea id="edit-evt-desc" name="description" maxlength="2000" rows="3"></textarea>
            </div>
            <div>
                <label for="edit-evt-organizer">Organizer Name <span aria-hidden="true">*</span></label>
                <input type="text" id="edit-evt-organizer" name="organizer" required maxlength="100">
            </div>
            <div>
                <label for="edit-evt-email">Contact Email <span aria-hidden="true">*</span></label>
                <input type="email" id="edit-evt-email" name="contactEmail" required maxlength="200">
            </div>
            <div class="field-full">
                <label for="edit-evt-rsvp">RSVP / Registration Link</label>
                <input type="url" id="edit-evt-rsvp" name="rsvpLink" maxlength="500">
            </div>
            <div class="edit-form-footer">
                <button type="submit" class="btn btn-blue">Save Changes</button>
                <button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
                <p id="edit-status" class="edit-status" aria-live="polite"></p>
            </div>
        </form>
    </div>
</div>

<!-- Add / Edit News modal -->
<div id="newsModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="news-modal-title">
    <div class="modal-content admin-edit-modal-content">
        <button class="close-btn" aria-label="Close" onclick="closeNewsModal()">&times;</button>
        <h2 id="news-modal-title">Add Story</h2>
        <form id="news-form" class="admin-edit-form" novalidate>
            <input type="hidden" id="news-id">
            <div class="field-full">
                <label for="news-title">Headline <span aria-hidden="true">*</span></label>
                <input type="text" id="news-title" required maxlength="300" placeholder="Article headline">
            </div>
            <div class="field-full">
                <label for="news-url">Article URL <span aria-hidden="true">*</span></label>
                <input type="url" id="news-url" required maxlength="500" placeholder="https://…">
            </div>
            <div>
                <label for="news-source">Publication <span aria-hidden="true">*</span></label>
                <input type="text" id="news-source" required maxlength="100" placeholder="e.g. South Bend Tribune">
            </div>
            <div>
                <label for="news-date">Published Date <span aria-hidden="true">*</span></label>
                <input type="date" id="news-date" required>
            </div>
            <div>
                <label for="news-category">Category <span aria-hidden="true">*</span></label>
                <input type="text" id="news-category" required maxlength="50" list="category-options" placeholder="e.g. Local Politics">
                <datalist id="category-options">
                    <option value="Local Politics">
                    <option value="Economy">
                    <option value="Healthcare">
                    <option value="Education">
                    <option value="Environment">
                    <option value="Voting Rights">
                    <option value="Opinion">
                    <option value="Press Release">
                </datalist>
            </div>
            <div>
                <label for="news-status">Status <span aria-hidden="true">*</span></label>
                <select id="news-status">
                    <option value="published">Published (visible on site)</option>
                    <option value="draft">Draft (hidden)</option>
                </select>
            </div>
            <div class="field-full">
                <label for="news-excerpt">Excerpt <span aria-hidden="true">*</span></label>
                <textarea id="news-excerpt" required maxlength="500" rows="3" placeholder="1–2 sentences summarizing why this story matters to the 2nd District…"></textarea>
            </div>
            <div class="edit-form-footer">
                <button type="submit" class="btn btn-blue">Save Story</button>
                <button type="button" class="btn btn-outline" onclick="closeNewsModal()">Cancel</button>
                <p id="news-status-msg" class="edit-status" aria-live="polite"></p>
            </div>
        </form>
    </div>
</div>

<script>
// ─── CONFIGURE THIS AFTER RUNNING: sam deploy ────────────────────────────────
const API_BASE = 'https://4ayg0m2fe8.execute-api.us-east-1.amazonaws.com/prod';
// ─────────────────────────────────────────────────────────────────────────────

const KEY_STORE = 'in02_admin_key';

// ------------------------------------------------------------------
// Toast
// ------------------------------------------------------------------

let toastTimer;
function showToast(msg, isError = false) {
    const el = document.getElementById('admin-toast');
    clearTimeout(toastTimer);
    el.textContent = msg;
    el.className = 'admin-toast show' + (isError ? ' error' : '');
    toastTimer = setTimeout(() => { el.className = 'admin-toast'; }, 3200);
}

// ------------------------------------------------------------------
// Auth
// ------------------------------------------------------------------

function getKey() { return sessionStorage.getItem(KEY_STORE) || ''; }
function saveKey(k) { sessionStorage.setItem(KEY_STORE, k); }
function clearKey() { sessionStorage.removeItem(KEY_STORE); }

async function tryLogin(key) {
    const res = await fetch(`${API_BASE}/admin/events`, {
        headers: { 'X-Admin-Key': key },
    });
    return res.status !== 401;
}

document.getElementById('auth-submit').addEventListener('click', async () => {
    const key = document.getElementById('admin-key-input').value.trim();
    const errEl = document.getElementById('auth-error');
    if (!key) { errEl.textContent = 'Please enter your admin key.'; return; }

    const btn = document.getElementById('auth-submit');
    btn.disabled = true;
    btn.textContent = 'Checking…';
    errEl.textContent = '';

    try {
        const ok = await tryLogin(key);
        if (ok) {
            saveKey(key);
            showDashboard();
        } else {
            errEl.textContent = 'Incorrect key. Please try again.';
        }
    } catch {
        errEl.textContent = 'Could not reach server. Check your connection.';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Log In';
    }
});

document.getElementById('admin-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-submit').click();
});

document.getElementById('logout-btn').addEventListener('click', () => {
    clearKey();
    document.getElementById('admin-dashboard').hidden = true;
    document.getElementById('auth-gate').hidden = false;
    document.getElementById('admin-key-input').value = '';
});

document.getElementById('refresh-btn').addEventListener('click', () => {
    loadAllEvents();
    loadAllNews();
});

// ------------------------------------------------------------------
// Formatting helpers
// ------------------------------------------------------------------

function fmt(str) {
    return (str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtDate(dateStr, timeStr) {
    const dt = new Date(`${dateStr}T${timeStr}`);
    return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })
        + ' at ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function fmtSubmitted(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
}

// ------------------------------------------------------------------
// Render
// ------------------------------------------------------------------

let cachedEvents = [];

function buildAdminCard(e) {
    const isPending  = e.status === 'pending';
    const isApproved = e.status === 'approved';

    const approveBtn = isPending
        ? `<button class="admin-btn admin-btn-approve" onclick="updateEvent('${e.id}','approved')">Approve</button>` : '';
    const rejectBtn = isPending
        ? `<button class="admin-btn admin-btn-reject" onclick="updateEvent('${e.id}','rejected')">Reject</button>` : '';
    const restoreBtn = (!isPending && !isApproved)
        ? `<button class="admin-btn admin-btn-approve" onclick="updateEvent('${e.id}','approved')">Restore</button>` : '';
    const unapproveBtn = isApproved
        ? `<button class="admin-btn admin-btn-reject" onclick="updateEvent('${e.id}','rejected')">Unapprove</button>` : '';

    return `
    <div class="admin-event status-${e.status}" data-id="${e.id}">
        <div class="admin-event-info">
            <span class="admin-event-status ${e.status}">${e.status.toUpperCase()}</span>
            <h3>${fmt(e.title)}</h3>
            <p class="admin-event-meta"><strong>When:</strong> ${fmtDate(e.date, e.time)}</p>
            <p class="admin-event-meta"><strong>Where:</strong> ${fmt(e.location)}${e.address ? ', ' + fmt(e.address) : ''}</p>
            <p class="admin-event-meta"><strong>Organizer:</strong> ${fmt(e.organizer)} &mdash; <a href="mailto:${fmt(e.contactEmail)}">${fmt(e.contactEmail)}</a></p>
            ${e.rsvpLink ? `<p class="admin-event-meta"><strong>RSVP:</strong> <a href="${fmt(e.rsvpLink)}" target="_blank" rel="noopener">${fmt(e.rsvpLink)}</a></p>` : ''}
            ${e.description ? `<p class="admin-event-description">${fmt(e.description)}</p>` : ''}
            <p class="admin-event-meta" style="margin-top:0.5rem;font-size:0.8rem;color:#888">Submitted ${fmtSubmitted(e.createdAt)}</p>
        </div>
        <div class="admin-event-actions">
            ${approveBtn}${unapproveBtn}${rejectBtn}${restoreBtn}
            <button class="admin-btn admin-btn-edit" onclick="editEvent('${e.id}')">Edit</button>
            <button class="admin-btn admin-btn-delete" onclick="deleteEvent('${e.id}','${fmt(e.title)}')">Delete</button>
        </div>
    </div>`;
}

function renderGroups(events) {
    cachedEvents = events;
    const pending  = events.filter(e => e.status === 'pending');
    const approved = events.filter(e => e.status === 'approved')
        .sort((a, b) => a.date.localeCompare(b.date));
    const rejected = events.filter(e => e.status === 'rejected');

    document.getElementById('pending-count').textContent  = pending.length;
    document.getElementById('approved-count').textContent = approved.length;

    const p = document.getElementById('pending-list');
    p.innerHTML = pending.length ? pending.map(buildAdminCard).join('') : '<p class="no-events">No pending submissions.</p>';

    const a = document.getElementById('approved-list');
    a.innerHTML = approved.length ? approved.map(buildAdminCard).join('') : '<p class="no-events">No approved events.</p>';

    const r = document.getElementById('rejected-list');
    r.innerHTML = rejected.length ? rejected.map(buildAdminCard).join('') : '<p class="no-events">None.</p>';
}

// ------------------------------------------------------------------
// API calls
// ------------------------------------------------------------------

async function loadAllEvents() {
    const key = getKey();
    try {
        const res = await fetch(`${API_BASE}/admin/events`, { headers: { 'X-Admin-Key': key } });
        if (res.status === 401) { clearKey(); location.reload(); return; }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        renderGroups(await res.json());
    } catch (err) {
        showToast('Failed to load events: ' + err.message, true);
    }
}

async function updateEvent(id, status) {
    const key = getKey();
    try {
        const res = await fetch(`${API_BASE}/admin/events/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
            body: JSON.stringify({ status }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast(`Event ${status} successfully.`);
        await loadAllEvents();
    } catch (err) {
        showToast('Update failed: ' + err.message, true);
    }
}

async function deleteEvent(id, title) {
    if (!confirm(`Delete "${title}"?\n\nThis cannot be undone.`)) return;
    const key = getKey();
    try {
        const res = await fetch(`${API_BASE}/admin/events/${id}`, {
            method: 'DELETE',
            headers: { 'X-Admin-Key': key },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast('Event deleted.');
        await loadAllEvents();
    } catch (err) {
        showToast('Delete failed: ' + err.message, true);
    }
}

// ------------------------------------------------------------------
// Edit event
// ------------------------------------------------------------------

function editEvent(id) {
    const evt = cachedEvents.find(e => e.id === id);
    if (!evt) { showToast('Event not found.', true); return; }

    document.getElementById('edit-evt-id').value        = evt.id;
    document.getElementById('edit-evt-title').value     = evt.title ?? '';
    document.getElementById('edit-evt-date').value      = evt.date ?? '';
    document.getElementById('edit-evt-time').value      = evt.time ?? '';
    document.getElementById('edit-evt-location').value  = evt.location ?? '';
    document.getElementById('edit-evt-address').value   = evt.address ?? '';
    document.getElementById('edit-evt-desc').value      = evt.description ?? '';
    document.getElementById('edit-evt-organizer').value = evt.organizer ?? '';
    document.getElementById('edit-evt-email').value     = evt.contactEmail ?? '';
    document.getElementById('edit-evt-rsvp').value      = evt.rsvpLink ?? '';
    document.getElementById('edit-status').textContent  = '';
    document.getElementById('edit-status').className    = 'edit-status';

    document.getElementById('editEventModal').style.display = 'block';
}

function closeEditModal() {
    document.getElementById('editEventModal').style.display = 'none';
}

document.getElementById('editEventModal').addEventListener('click', e => {
    if (e.target === document.getElementById('editEventModal')) closeEditModal();
});

document.getElementById('edit-event-form').addEventListener('submit', async e => {
    e.preventDefault();
    const id = document.getElementById('edit-evt-id').value;
    const statusEl  = document.getElementById('edit-status');
    const submitBtn = e.target.querySelector('button[type="submit"]');

    const fields = {
        title:        document.getElementById('edit-evt-title').value.trim(),
        date:         document.getElementById('edit-evt-date').value,
        time:         document.getElementById('edit-evt-time').value,
        location:     document.getElementById('edit-evt-location').value.trim(),
        address:      document.getElementById('edit-evt-address').value.trim(),
        description:  document.getElementById('edit-evt-desc').value.trim(),
        organizer:    document.getElementById('edit-evt-organizer').value.trim(),
        contactEmail: document.getElementById('edit-evt-email').value.trim(),
        rsvpLink:     document.getElementById('edit-evt-rsvp').value.trim(),
    };

    if (!fields.title || !fields.date || !fields.time || !fields.location || !fields.organizer || !fields.contactEmail) {
        statusEl.textContent = 'Please fill in all required fields.';
        statusEl.className = 'edit-status error';
        return;
    }

    submitBtn.disabled = true;
    statusEl.textContent = 'Saving…';
    statusEl.className = 'edit-status';

    try {
        const res = await fetch(`${API_BASE}/admin/events/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Key': getKey() },
            body: JSON.stringify(fields),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast('Event saved successfully.');
        closeEditModal();
        await loadAllEvents();
    } catch (err) {
        statusEl.textContent = 'Save failed: ' + err.message;
        statusEl.className = 'edit-status error';
    } finally {
        submitBtn.disabled = false;
        if (statusEl.textContent === 'Saving…') statusEl.textContent = '';
    }
});

// ------------------------------------------------------------------
// News management
// ------------------------------------------------------------------

let cachedNews = [];

function buildNewsAdminCard(n) {
    const isPublished = n.status === 'published';
    const toggleBtn = isPublished
        ? `<button class="admin-btn admin-btn-reject" onclick="toggleNewsStatus('${n.id}','draft')">Unpublish</button>`
        : `<button class="admin-btn admin-btn-approve" onclick="toggleNewsStatus('${n.id}','published')">Publish</button>`;

    return `
    <div class="admin-event" data-id="${n.id}">
        <div class="admin-event-info">
            <span class="news-category-badge">${fmt(n.category)}</span>
            <h3>${fmt(n.title)}</h3>
            <p class="admin-event-meta"><strong>${fmt(n.source)}</strong> &middot; ${fmt(n.publishedDate)}</p>
            <p class="admin-event-description">${fmt(n.excerpt)}</p>
            <p class="admin-event-meta" style="margin-top:0.4rem">
                <a href="${fmt(n.url)}" target="_blank" rel="noopener">View article ↗</a>
            </p>
        </div>
        <div class="admin-event-actions">
            <button class="admin-btn admin-btn-edit" onclick="openNewsModal('${n.id}')">Edit</button>
            ${toggleBtn}
            <button class="admin-btn admin-btn-delete" onclick="deleteNewsItem('${n.id}','${fmt(n.title)}')">Delete</button>
        </div>
    </div>`;
}

function renderNewsGroups(items) {
    cachedNews = items;
    const published = items.filter(n => n.status === 'published')
        .sort((a, b) => b.publishedDate.localeCompare(a.publishedDate));
    const drafts = items.filter(n => n.status !== 'published')
        .sort((a, b) => b.publishedDate.localeCompare(a.publishedDate));

    document.getElementById('published-news-count').textContent = published.length;

    const pubEl = document.getElementById('published-news-list');
    pubEl.innerHTML = published.length
        ? published.map(buildNewsAdminCard).join('')
        : '<p class="no-events">No published stories.</p>';

    const draftEl = document.getElementById('draft-news-list');
    draftEl.innerHTML = drafts.length
        ? drafts.map(buildNewsAdminCard).join('')
        : '<p class="no-events">None.</p>';
}

async function loadAllNews() {
    const key = getKey();
    try {
        const res = await fetch(`${API_BASE}/admin/news`, { headers: { 'X-Admin-Key': key } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        renderNewsGroups(await res.json());
    } catch (err) {
        showToast('Failed to load news: ' + err.message, true);
    }
}

function openNewsModal(id) {
    const isEdit = !!id;
    document.getElementById('news-modal-title').textContent = isEdit ? 'Edit Story' : 'Add Story';
    document.getElementById('news-id').value = id || '';
    document.getElementById('news-status-msg').textContent = '';
    document.getElementById('news-status-msg').className = 'edit-status';

    if (isEdit) {
        const n = cachedNews.find(x => x.id === id);
        if (!n) { showToast('Story not found.', true); return; }
        document.getElementById('news-title').value    = n.title ?? '';
        document.getElementById('news-url').value      = n.url ?? '';
        document.getElementById('news-source').value   = n.source ?? '';
        document.getElementById('news-date').value     = n.publishedDate ?? '';
        document.getElementById('news-category').value = n.category ?? '';
        document.getElementById('news-excerpt').value  = n.excerpt ?? '';
        document.getElementById('news-status').value   = n.status ?? 'published';
    } else {
        document.getElementById('news-form').reset();
        document.getElementById('news-status').value = 'published';
    }

    document.getElementById('newsModal').style.display = 'block';
}

function closeNewsModal() {
    document.getElementById('newsModal').style.display = 'none';
}

document.getElementById('newsModal').addEventListener('click', e => {
    if (e.target === document.getElementById('newsModal')) closeNewsModal();
});

document.getElementById('news-form').addEventListener('submit', async e => {
    e.preventDefault();
    const id = document.getElementById('news-id').value;
    const isEdit = !!id;
    const statusEl  = document.getElementById('news-status-msg');
    const submitBtn = e.target.querySelector('button[type="submit"]');

    const fields = {
        title:         document.getElementById('news-title').value.trim(),
        url:           document.getElementById('news-url').value.trim(),
        source:        document.getElementById('news-source').value.trim(),
        publishedDate: document.getElementById('news-date').value,
        category:      document.getElementById('news-category').value.trim(),
        excerpt:       document.getElementById('news-excerpt').value.trim(),
        status:        document.getElementById('news-status').value,
    };

    if (!fields.title || !fields.url || !fields.source || !fields.publishedDate || !fields.category || !fields.excerpt) {
        statusEl.textContent = 'Please fill in all required fields.';
        statusEl.className = 'edit-status error';
        return;
    }

    submitBtn.disabled = true;
    statusEl.textContent = 'Saving…';
    statusEl.className = 'edit-status';

    try {
        const res = await fetch(
            isEdit ? `${API_BASE}/admin/news/${id}` : `${API_BASE}/admin/news`,
            {
                method: isEdit ? 'PATCH' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Key': getKey() },
                body: JSON.stringify(fields),
            }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast(isEdit ? 'Story updated.' : 'Story added.');
        closeNewsModal();
        await loadAllNews();
    } catch (err) {
        statusEl.textContent = 'Save failed: ' + err.message;
        statusEl.className = 'edit-status error';
    } finally {
        submitBtn.disabled = false;
        if (statusEl.textContent === 'Saving…') statusEl.textContent = '';
    }
});

async function toggleNewsStatus(id, status) {
    const key = getKey();
    try {
        const res = await fetch(`${API_BASE}/admin/news/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
            body: JSON.stringify({ status }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast(status === 'published' ? 'Story published.' : 'Story unpublished.');
        await loadAllNews();
    } catch (err) {
        showToast('Update failed: ' + err.message, true);
    }
}

async function deleteNewsItem(id, title) {
    if (!confirm(`Delete "${title}"?\n\nThis cannot be undone.`)) return;
    const key = getKey();
    try {
        const res = await fetch(`${API_BASE}/admin/news/${id}`, {
            method: 'DELETE',
            headers: { 'X-Admin-Key': key },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast('Story deleted.');
        await loadAllNews();
    } catch (err) {
        showToast('Delete failed: ' + err.message, true);
    }
}

// ------------------------------------------------------------------
// Boot
// ------------------------------------------------------------------

function showDashboard() {
    document.getElementById('auth-gate').hidden = true;
    document.getElementById('admin-dashboard').hidden = false;
    loadAllEvents();
    loadAllNews();
}

// Auto-login if key is already in session storage
if (getKey()) {
    showDashboard();
} else {
    document.getElementById('admin-key-input').focus();
}
</script>
